<style>

/* ===== TOKENS — padronizado com o HUB ===== */
:root{
  --font:'Plus Jakarta Sans','Segoe UI',-apple-system,sans-serif;
  --orange:#cf6514; --orange-l:#ed771b; --amber:#f4aa2e;
  --accent:var(--orange); --accent2:var(--orange-l);
  --green:#22c55e; --green-l:#4ade80; --blue:#3b82f6; --blue-l:#60a5fa;
  --red:#ef4444; --red-l:#f87171; --purple:#8b5cf6;
  --bg:#080808; --surface:#111111; --surface2:#191919; --surface3:#222222; --surface4:#2a2a2a;
  --border:#252525; --border2:#303030;
  --text:#f0f0f0; --text2:#a0a0a0; --text3:#606060;
  --r-sm:6px; --r:9px; --r-md:12px; --r-lg:16px; --r-full:9999px;
  --shadow:0 4px 12px rgba(0,0,0,.4); --shadow-lg:0 8px 28px rgba(0,0,0,.5);
}
body.light-mode{
  --bg:#f2f4f7; --surface:#ffffff; --surface2:#eaecf0; --surface3:#dde1e8; --surface4:#cfd4de;
  --border:#dde1e8; --border2:#c8cfd9;
  --text:#1a1f2e; --text2:#4a5568; --text3:#8a96a8;
  --green:#16a34a; --green-l:#22c55e; --blue:#2563eb; --blue-l:#3b82f6;
  --red:#dc2626; --red-l:#ef4444;
  --shadow:0 4px 12px rgba(20,30,55,.10); --shadow-lg:0 12px 32px rgba(20,30,55,.16);
}
/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s}

/* ÍCONES LUCIDE (sprite) */
.ic{width:1em;height:1em;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:-.14em;line-height:0}
.ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* APP LAYOUT */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface2);border-right:1px solid var(--border);color:var(--text);display:flex;flex-direction:column;overflow:hidden;z-index:200;transition:transform .3s ease}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(207,101,20,.07) 0%,transparent 100%)}
.sidebar-brand .brand-name{display:flex;align-items:center;gap:9px;font-size:1rem;font-weight:800;letter-spacing:-.3px}
.sidebar-brand .brand-name .ic{font-size:18px;color:var(--accent)}
.sidebar-brand .brand-sub{font-size:.66rem;color:var(--text3);margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-weight:700}

.sidebar-search{padding:12px;border-bottom:1px solid var(--border)}
.search-wrap{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap .ic{font-size:15px;color:var(--text3)}
.sidebar-search input{flex:1;background:none;border:none;color:var(--text);font-size:.875rem;outline:none;font-family:var(--font)}
.sidebar-search input::placeholder{color:var(--text3)}

.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 8px}
.sidebar-nav::-webkit-scrollbar{width:5px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:9px}

.nav-section{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:10px 10px 4px}
.nav-divider{height:1px;background:var(--border);margin:6px 4px}

.nav-dest{position:relative}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;background:transparent;border:none;border-radius:var(--r);color:var(--text2);text-align:left;font-size:.875rem;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s;gap:9px;position:relative;margin-bottom:2px}
.nav-item .ic{font-size:18px;color:var(--text2);transition:color .15s}
.nav-item:hover{background:rgba(207,101,20,.09);color:var(--orange-l)}
.nav-item:hover .ic{color:var(--orange-l)}
.nav-item.active{background:rgba(207,101,20,.14);color:var(--orange-l);font-weight:600}
.nav-item.active .ic{color:var(--orange-l)}
.nav-item.active::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;background:var(--orange);border-radius:var(--r-full)}

.nav-subcats{display:none;padding:2px 0 6px 6px}
.nav-subcats.visible{display:block}
.nav-subitem{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px 6px 24px;background:transparent;border:none;border-radius:var(--r-sm);color:var(--text3);text-align:left;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:var(--font)}
.nav-subitem .ic{font-size:15px}
.nav-subitem:hover{background:rgba(207,101,20,.09);color:var(--orange-l)}
.nav-subitem.active{color:var(--text);font-weight:600;background:var(--surface3)}

/* PERFIL (rodapé) */
.sidebar-footer{padding:8px;border-top:1px solid var(--border);flex-shrink:0;position:relative}
.profile-trigger{display:flex;align-items:center;gap:10px;width:100%;padding:8px;border-radius:var(--r);background:transparent;border:1px solid transparent;cursor:pointer;font-family:var(--font);text-align:left;transition:all .15s}
.profile-trigger:hover{background:var(--surface3);border-color:var(--border2)}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;position:relative;background:var(--blue);color:#fff}
.avatar.admin{background:var(--accent);color:#080808}
.avatar::after{content:'';position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface2)}
.profile-meta{flex:1;min-width:0}
.profile-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-role{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.profile-role .ic{font-size:12px}
.profile-chev{color:var(--text3);font-size:16px}
.profile-menu{position:absolute;bottom:62px;left:8px;right:8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);box-shadow:var(--shadow-lg);padding:6px;display:none;z-index:50}
.profile-menu.open{display:block}
.pm-head{padding:10px 10px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.pm-name{font-size:13px;font-weight:700;color:var(--text)}
.pm-sub{font-size:11px;color:var(--text3)}
.pm-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:var(--r);background:transparent;border:none;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;text-align:left}
.pm-item .ic{font-size:16px}
.pm-item:hover{background:var(--surface3);color:var(--text)}
.pm-item.danger:hover{color:var(--red)}
.pm-toggle{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent2);background:var(--surface3);border-radius:var(--r-full);padding:3px 9px}
.pm-toggle .ic{font-size:14px}

/* OVERLAY (mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.sidebar-overlay.visible{display:block}

/* MAIN PANEL */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR (mobile only) */
.topbar{display:none;align-items:center;gap:12px;padding:0 16px;height:54px;background:var(--surface2);color:var(--text);flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,transparent,var(--amber) 25%,var(--orange) 50%,var(--amber) 75%,transparent)}
.topbar-title{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:800;flex:1}
.topbar-title .ic{font-size:18px;color:var(--accent)}
.hamburger{display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1}

/* ADMIN TOOLBAR */
.admin-toolbar{display:none;background:rgba(244,170,46,.08);border-bottom:1px solid rgba(244,170,46,.3);padding:10px 16px;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.admin-toolbar.visible{display:flex}
.admin-toolbar > span{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--amber);font-weight:600}
.admin-toolbar > span .ic{font-size:15px}
.btn-add{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#080808;border:none;padding:8px 16px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:700;font-family:var(--font);transition:background .2s}
.btn-add:hover{background:var(--accent2)}
.btn-export{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--text2);border:1px solid var(--border2);padding:8px 14px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:600;font-family:var(--font);transition:all .2s;margin-left:auto}
.btn-export:hover{border-color:var(--accent);color:var(--orange-l)}
.btn-publish{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#08210f;border:none;padding:8px 14px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:700;font-family:var(--font);transition:filter .2s}
.btn-publish:hover{filter:brightness(1.08)}
.btn-publish:disabled{opacity:.5;cursor:not-allowed}
.btn-netlify-cfg{display:inline-flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:15px}
.btn-netlify-cfg:hover{border-color:var(--accent);color:var(--orange-l)}
.btn-logout{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 12px;border-radius:var(--r);cursor:pointer;font-size:.8rem;font-family:var(--font)}
.btn-logout:hover{border-color:var(--red);color:var(--red-l)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px}
.count{font-size:.83rem;color:var(--text3);margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.card.edit-mode{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{font-weight:700;font-size:.95rem;color:var(--text);line-height:1.3}
.card-badge{font-size:.7rem;padding:3px 9px;border-radius:var(--r-full);font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-atacama{background:rgba(244,170,46,.15);color:var(--amber)}
.badge-uyuni{background:rgba(59,130,246,.15);color:var(--blue-l)}
.badge-santiago{background:rgba(34,197,94,.15);color:var(--green-l)}
.badge-peru{background:rgba(139,92,246,.15);color:#a78bfa}
.badge-vendas{background:rgba(207,101,20,.15);color:var(--orange-l)}
.badge-empresa{background:var(--surface3);color:var(--text2)}
.badge-roteiros{background:rgba(244,170,46,.13);color:var(--amber)}
.badge-cartagena{background:rgba(236,72,153,.15);color:#f472b6}
.badge-sanandres{background:rgba(6,182,212,.15);color:#22d3ee}
.card-key{font-size:.7rem;color:var(--text3);font-family:ui-monospace,monospace}
.card-text{font-size:.875rem;line-height:1.65;color:var(--text2);white-space:pre-wrap;max-height:130px;overflow:hidden;position:relative;transition:max-height .3s ease}
.card-text.expanded{max-height:3000px}
.card-text:not(.expanded)::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45px;background:linear-gradient(transparent,var(--surface))}
.card-actions{display:flex;gap:8px;margin-top:2px}
.btn-expand{background:transparent;border:1px solid var(--border2);color:var(--text3);padding:6px 11px;border-radius:var(--r);cursor:pointer;font-size:.78rem;font-family:var(--font);transition:border-color .2s}
.btn-expand:hover{border-color:var(--accent);color:var(--orange-l)}
.btn-copy{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--accent);color:#080808;border:none;padding:8px 14px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:700;font-family:var(--font);transition:background .2s}
.btn-copy .ic{font-size:15px}
.btn-copy:hover{background:var(--accent2)}
.btn-copy.copied{background:var(--green);color:#08210f}

/* ADMIN CARD ACTIONS */
.card-admin-actions{display:none;gap:8px}
.card-admin-actions.visible{display:flex}
.btn-edit-card{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:rgba(244,170,46,.1);color:var(--amber);border:1px solid rgba(244,170,46,.4);padding:7px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:600;font-family:var(--font);transition:background .2s}
.btn-edit-card .ic{font-size:14px}
.btn-edit-card:hover{background:rgba(244,170,46,.18)}
.btn-delete-card{display:inline-flex;align-items:center;justify-content:center;background:rgba(239,68,68,.1);color:var(--red-l);border:1px solid rgba(239,68,68,.4);padding:7px 12px;border-radius:var(--r);cursor:pointer;font-size:15px;transition:background .2s}
.btn-delete-card:hover{background:rgba(239,68,68,.18)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface3);color:var(--text);padding:10px 18px;border-radius:var(--r);font-size:.875rem;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:9999;box-shadow:var(--shadow-lg);border:1px solid var(--border2)}
.toast.show{opacity:1;transform:translateY(0)}
.no-results{text-align:center;color:var(--text3);padding:48px;grid-column:1/-1}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);font-size:.875rem;font-family:var(--font);outline:none;transition:border-color .2s;color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:180px;resize:vertical;line-height:1.6}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-modal-save{flex:1;background:var(--accent);color:#080808;border:none;padding:10px;border-radius:var(--r);cursor:pointer;font-weight:700;font-size:.9rem;font-family:var(--font)}
.btn-modal-save:hover{background:var(--accent2)}
.btn-modal-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:10px 18px;border-radius:var(--r);cursor:pointer;font-size:.875rem;font-family:var(--font)}
.btn-modal-cancel:hover{border-color:var(--accent);color:var(--orange-l)}

/* PASSWORD MODAL */
.pwd-modal{max-width:360px;text-align:center}
.pwd-modal h2{margin-bottom:8px}
.pwd-modal p{font-size:.85rem;color:var(--text3);margin-bottom:20px}
.pwd-error{color:var(--red-l);font-size:.82rem;margin-top:8px;display:none}

/* CONFIRM MODAL */
.confirm-modal{max-width:380px;text-align:center}
.confirm-modal p{font-size:.9rem;color:var(--text2);margin-bottom:20px;line-height:1.5}
.btn-confirm-delete{flex:1;background:var(--red);color:#fff;border:none;padding:10px;border-radius:var(--r);cursor:pointer;font-weight:700;font-size:.9rem;font-family:var(--font)}

/* INSTALL BANNER */
.install-banner{display:none;background:rgba(207,101,20,.1);border-bottom:1px solid rgba(207,101,20,.3);color:var(--text);padding:12px 16px;align-items:center;gap:12px;font-size:.85rem;flex-shrink:0}
.install-banner.visible{display:flex}
.install-banner > span:first-of-type{display:inline-flex;align-items:center;gap:8px;flex:1}
.install-banner .ic{font-size:16px;color:var(--accent)}
.btn-install{background:var(--accent);color:#080808;border:none;padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:700;white-space:nowrap;font-family:var(--font)}
.btn-install-close{display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:0 4px}

/* LINKS VIEW */
.links-view{flex:1;overflow-y:auto;padding:20px;display:none}
.lk-page-header{margin-bottom:20px}
.lk-page-title{display:flex;align-items:center;gap:9px;font-size:1.1rem;font-weight:800;color:var(--text)}
.lk-page-title .ic{font-size:20px;color:var(--accent)}
.lk-page-sub{font-size:.8rem;color:var(--text3);margin-top:4px}
.lk-section{margin-bottom:24px}
.lk-section-title{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.lk-section-title .ic{font-size:15px;color:var(--accent)}
.lk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.lk-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-decoration:none;color:inherit;cursor:pointer;transition:border-color .15s}
.lk-card:hover{border-color:var(--border2)}
.lk-card.placeholder{opacity:.45;cursor:default}
.lk-card.placeholder:hover{border-color:var(--border)}
.lk-ico{font-size:1.3rem;flex-shrink:0;line-height:1}
.lk-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.lk-name{font-size:.79rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lk-desc{font-size:.67rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lk-tel{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.lk-dest-block{margin-bottom:16px}
.lk-dest-header{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:700;color:var(--text);background:var(--surface3);border-radius:8px;padding:6px 12px;margin-bottom:8px}
.lk-dest-header .ic{font-size:15px;color:var(--accent)}
.lk-placeholder-dest{font-size:.78rem;color:var(--text3);font-style:italic;padding:8px 2px}
.lk-copy-btn{margin-left:auto;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:var(--surface3);border:none;border-radius:6px;padding:5px 9px;font-size:.72rem;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .15s}
.lk-copy-btn .ic{font-size:13px}
.lk-copy-btn:hover{background:var(--surface4);color:var(--text)}
.lk-copy-btn.copiado{background:rgba(34,197,94,.18);color:var(--green-l)}

/* ONBOARDING VIEW */
.onboarding-view{flex:1;overflow-y:auto;padding:20px;display:none}
.ob-page-header{margin-bottom:18px}
.ob-page-title{display:flex;align-items:center;gap:9px;font-size:1.1rem;font-weight:800;color:var(--text);flex-wrap:wrap}
.ob-page-title .ic{font-size:20px;color:var(--accent)}
.wip-badge{background:rgba(244,170,46,.12);color:var(--amber);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(244,170,46,.4);white-space:nowrap}
.ob-page-sub{font-size:.8rem;color:var(--text3);margin-top:5px}
.ob-accordion{display:flex;flex-direction:column;gap:10px}
.ob-acc-item{background:var(--surface);border-radius:var(--r-md);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.ob-acc-trigger{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;background:none;border:none;cursor:pointer;text-align:left;transition:background .15s;color:var(--text)}
.ob-acc-trigger:hover{background:var(--surface2)}
.ob-acc-emoji{display:inline-flex;font-size:1.3rem;flex-shrink:0;color:var(--accent)}
.ob-acc-info{flex:1;min-width:0}
.ob-acc-title{font-weight:700;font-size:.95rem;color:var(--text)}
.ob-acc-meta{font-size:.76rem;color:var(--text3);margin-top:2px}
.ob-acc-chevron{display:inline-flex;font-size:1.1rem;color:var(--text3);transition:transform .25s;flex-shrink:0}
.ob-acc-item.open .ob-acc-chevron{transform:rotate(90deg)}
.ob-acc-body{display:none;padding:16px 18px 18px;border-top:1px solid var(--border)}
.ob-acc-item.open .ob-acc-body{display:block}
.ob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.ob-card{background:var(--surface2);border-radius:9px;padding:12px;border:1px solid var(--border);border-left:4px solid var(--border2)}
.ob-card.ok{border-left-color:var(--green)}
.ob-card.warn{border-left-color:var(--amber)}
.ob-card-top{display:flex;align-items:flex-start;gap:10px}
.ob-ico{display:inline-flex;font-size:1.1rem;flex-shrink:0;margin-top:1px;color:var(--text2)}
.ob-info{flex:1;min-width:0}
.ob-name{font-weight:600;font-size:.87rem;color:var(--text)}
.ob-who{font-size:.76rem;color:var(--text3);margin-top:2px}
.ob-who strong{color:var(--text)}
.ob-badge{font-size:.67rem;font-weight:700;padding:3px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0}
.ob-badge.ok{background:rgba(34,197,94,.15);color:var(--green-l)}
.ob-badge.warn{background:rgba(244,170,46,.15);color:var(--amber)}
.ob-note{font-size:.75rem;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}
.ob-note.pending{color:var(--amber)}
.ob-wpp-cat{margin-bottom:14px}
.ob-wpp-cat-label{font-size:.71rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.ob-wpp-rows{display:flex;flex-direction:column;gap:3px}
.ob-wpp-row{display:flex;align-items:baseline;gap:8px;background:var(--surface2);border-radius:7px;padding:8px 11px;border:1px solid var(--border)}
.ob-wpp-gname{font-size:.8rem;font-weight:600;color:var(--text);flex-shrink:0}
.ob-wpp-sep{color:var(--text3);flex-shrink:0}
.ob-wpp-gdesc{font-size:.76rem;color:var(--text3)}
.ob-todo{display:flex;flex-direction:column;gap:8px}
.ob-todo-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border-radius:8px;padding:11px 13px;border:1px solid var(--border);font-size:.84rem;color:var(--text2);line-height:1.5}
.ob-todo-icon{display:inline-flex;flex-shrink:0;color:var(--accent)}

/* RESPONSIVE */
@media (max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{display:flex}
}
@media (max-width:600px){
  .cards{grid-template-columns:1fr}
  .modal{padding:20px}
  .modal-overlay{padding:12px;align-items:flex-end}
  .modal{border-radius:16px 16px 12px 12px;max-height:92vh}
  .admin-toolbar{gap:8px}
  .btn-export{margin-left:0;width:100%;justify-content:center}
  .btn-copy,.btn-edit-card{min-height:44px}
  .card-text{max-height:100px}
}

/* ===== LOGIN ===== */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:2000;padding:20px}
.login-img{width:132px;height:auto;display:block;margin:0 auto 10px}
.login-box{width:100%;max-width:360px;text-align:center}
.login-logo{display:inline-flex;align-items:center;gap:10px;font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:26px}
.login-logo .ic{font-size:24px;color:var(--accent)}
.login-sub{font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:28px}
.login-field{position:relative;margin-bottom:14px}
.login-field .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3)}
.login-input{width:100%;padding:12px 42px 12px 40px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--accent)}
.login-eye{position:absolute;right:6px;top:0;bottom:0;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 8px;line-height:0}
.login-btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:var(--accent);color:#080808;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s;margin-top:4px}
.login-btn:hover{background:var(--accent2)}
.login-btn:disabled{opacity:.6;cursor:wait}
.login-err{color:var(--red-l);font-size:13px;margin-top:12px;min-height:18px}

/* ===== SEARCH HERO (topo do conteúdo) ===== */
.hero{max-width:640px;margin:0 auto 8px}
.hero-search{display:flex;align-items:center;gap:10px;border:2px solid var(--border2);border-radius:12px;padding:12px 16px;background:var(--surface);transition:border-color .2s}
.hero-search:focus-within{border-color:var(--accent)}
.hero-search .ic{font-size:20px;color:var(--text3)}
.hero-search input{flex:1;background:none;border:none;color:var(--text);font-size:15px;outline:none;font-family:var(--font)}
.hero-search input::placeholder{color:var(--text3)}

/* ===== TEMPLATES grupos ===== */
.tpl-group{margin:22px auto 0;max-width:980px}
.tpl-group-title{display:flex;align-items:center;gap:8px;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin:0 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.tpl-group-title .ic{font-size:16px;color:var(--accent)}
.tpl-group-title .cnt{margin-left:auto;color:var(--text3);font-weight:700;font-size:11px}
.tpl-sub{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px}
.selo-interno{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:800;padding:2px 8px;border-radius:var(--r-full);background:rgba(239,68,68,.13);color:var(--red-l);border:1px solid rgba(239,68,68,.35)}
.selo-interno .ic{font-size:12px}
.badge-inativo{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:var(--r-full);background:var(--surface3);color:var(--text3)}
.card.inativo{opacity:.55}

/* ===== chips (início calmo) ===== */
.start{max-width:640px;margin:18px auto 0;text-align:center}
.start p{color:var(--text3);font-size:13px;margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 13px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.chip .ic{font-size:14px}
.chip:hover{border-color:var(--accent);color:var(--orange-l)}
.chips-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:18px 0 8px}

/* ===== em breve ===== */
.embreve{max-width:520px;margin:60px auto;text-align:center;color:var(--text3)}
.embreve .ic{font-size:40px;color:var(--text4,var(--border2));display:block;margin:0 auto 14px}
.embreve h3{color:var(--text2);font-size:16px;font-weight:700;margin-bottom:6px}
.embreve p{font-size:13px;line-height:1.5}

.view{display:none}
.view.active{display:block}
.loading{text-align:center;color:var(--text3);padding:50px;font-size:13px}

/* ===== admin ===== */
.view-toolbar{max-width:980px;margin:0 auto 8px;display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.view-toolbar h2{font-size:18px;font-weight:800;flex:1}
.area-header{position:relative;flex-shrink:0;padding:14px 24px 0}
.area-title{font-size:13px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;text-align:center;max-width:1000px;margin:0 auto;padding-bottom:12px;border-bottom:1px solid var(--border)}
.area-clock{position:absolute;right:24px;top:11px;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums}
.area-clock .ic{font-size:14px;color:var(--text3)}
.sidebar-online-wrap{padding:8px 14px 10px;border-top:1px solid var(--border);max-height:190px;overflow-y:auto;flex-shrink:0}
.sidebar-online-wrap .nav-section{margin:0 0 6px}
.btn-novo{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#080808;border:none;padding:9px 15px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-novo:hover{background:var(--accent2)}
.btn-novo .ic{font-size:15px}
.card-admin{display:flex;gap:8px;margin-top:2px}
.btn-mini{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:var(--font);cursor:pointer}
.btn-mini .ic{font-size:13px}
.btn-mini:hover{border-color:var(--accent);color:var(--orange-l)}
.btn-mini.del:hover{border-color:var(--red);color:var(--red-l)}
.utable{max-width:840px;margin:0 auto;width:100%;border-collapse:collapse}
.utable th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
.utable td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.utable tr:hover td{background:var(--surface2)}
.papel-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--r-full)}
.papel-admin{background:rgba(207,101,20,.15);color:var(--orange-l)}
.papel-vendedor{background:rgba(59,130,246,.15);color:var(--blue-l)}
.papel-espectador{background:var(--surface3);color:var(--text3)}
.st-inativo{color:var(--text3)}
.urow-acts{display:flex;gap:6px;justify-content:flex-end}
.modal .row{display:flex;gap:10px}
.modal .row > *{flex:1}
.chk{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--text2);cursor:pointer;margin:4px 0 2px}
.senha-info{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green-l);font-size:12px;padding:8px 12px;border-radius:var(--r);margin-top:10px;display:none}

.repo-cat-bar{max-width:840px;margin:0 auto 14px;display:flex;gap:8px;flex-wrap:wrap}
.repo-chip{font-size:12px;padding:5px 12px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font)}
.repo-chip.on{background:rgba(207,101,20,.14);border-color:var(--accent);color:var(--orange-l)}
.repo-grid{max-width:840px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.repo-card{display:flex;flex-direction:column;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
.repo-card.destaque{border-color:rgba(207,101,20,.4)}
.repo-top{display:flex;align-items:flex-start;gap:10px}
.repo-ic{font-size:22px;color:var(--accent);flex-shrink:0}
.repo-nome{font-size:14px;font-weight:700;color:var(--text);line-height:1.25}
.repo-desc{font-size:12px;color:var(--text3);margin-top:2px}
.repo-meta{display:flex;align-items:center;gap:8px;margin-top:auto}
.repo-catbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);background:var(--surface3);padding:2px 8px;border-radius:var(--r-full)}
.repo-open{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:var(--surface3);border:none;border-radius:var(--r);padding:6px 11px;font-size:12px;color:var(--text);cursor:pointer;font-family:var(--font);text-decoration:none}
.repo-open:hover{background:var(--surface4)}
.repo-open .ic{font-size:13px}
.repo-admin{display:flex;gap:6px;border-top:1px solid var(--border);padding-top:8px}

.selo-hub{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:800;padding:2px 8px;border-radius:var(--r-full);background:rgba(59,130,246,.14);color:var(--blue-l);border:1px solid rgba(59,130,246,.3);margin-left:auto}
.hubsec{max-width:900px;margin:0 auto}
.dest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.dest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px}
.dest-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dest-emoji{font-size:26px;line-height:1}
.dest-nome{font-size:16px;font-weight:800;color:var(--text)}
.dest-pais{font-size:12px;color:var(--text3)}
.dest-desc{font-size:13px;color:var(--text2);line-height:1.5}
.dest-bloco{margin-top:10px}
.dest-bloco b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:3px}
.dest-bloco span{font-size:12.5px;color:var(--text2);line-height:1.5}
.hub-dgroup{margin-bottom:22px}
.hub-dgroup>h3{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.hub-dgroup>h3 .ic{color:var(--accent);font-size:15px}
.utable td .ic{font-size:13px;color:var(--text3);vertical-align:-2px;margin-right:4px}

.lk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.lk-ghead{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin-top:12px}
.lk-bar{width:4px;height:22px;border-radius:2px;background:var(--accent);flex-shrink:0}
.lk-gname{font-size:15px;font-weight:800;color:var(--accent)}
.lk-gcount{font-size:12px;color:var(--text3);margin-left:auto}
.lk-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:12px;padding:14px}
.lk-codigo{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.lk-nome{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}
.lk-rows{display:flex;flex-direction:column;gap:5px}
.lk-row{font-size:13px;color:var(--text2)}
.lk-row .ic{font-size:13px;color:var(--text3);vertical-align:-2px;margin-right:3px}
.lk-row strong{color:var(--text2);font-weight:700}
.lk-notion a{color:var(--accent);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-size:13px}
.lk-emerg{font-size:12px;color:var(--text3);margin-top:3px;border-top:1px solid var(--border);padding-top:5px}
.lk-parc{font-size:11px;color:var(--text3);margin-top:3px}

.tt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-items:start}
.tt-ghead{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:22px 0 2px;padding:9px 12px;background:var(--surface2);border-radius:8px}
.tt-bar{width:4px;height:20px;border-radius:2px;background:var(--accent);flex-shrink:0}
.tt-gname{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:.2px}
.tt-controls{max-width:900px;margin:0 auto 6px;display:flex;flex-direction:column;gap:10px}
.tt-search{display:flex;align-items:center;gap:8px;border:1px solid var(--border2);border-radius:10px;padding:9px 13px;background:var(--surface)}
.tt-search:focus-within{border-color:var(--accent)}
.tt-search .ic{color:var(--text3);font-size:16px}
.tt-search input{flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none;font-family:var(--font)}
.tt-chips{display:flex;flex-wrap:wrap;gap:7px}
.tt-chip{font-size:12px;padding:5px 12px;border-radius:var(--r-full);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font)}
.tt-chip.on{background:rgba(207,101,20,.14);border-color:var(--accent);color:var(--orange-l)}
.tt-gcount{font-size:12px;color:var(--text3);margin-left:auto}
.tt-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px}
.tt-code{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase;word-break:break-word}
.tt-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.tt-attrs{display:flex;flex-direction:column;gap:5px}
.tt-attr{font-size:13px;color:var(--text2);display:flex;gap:7px;align-items:flex-start;line-height:1.4}
.tt-attr .ic{color:var(--text3);font-size:14px;margin-top:2px;flex-shrink:0}
.tt-attr strong{color:var(--text);font-weight:700}
.tt-foot{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:1px;padding-top:9px;border-top:1px solid var(--border)}
.tt-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;text-decoration:none;padding:5px 10px;border-radius:8px}
.tt-btn .ic{font-size:13px}
.tt-notion{color:var(--accent);background:rgba(207,101,20,.12)}
.tt-emerg{color:#ef4444;background:rgba(239,68,68,.12)}
.tt-parc{font-size:11px;color:var(--text3);margin-left:auto;display:inline-flex;align-items:center;gap:5px}
.tt-parc .ic{font-size:12px}
.tt-copy{color:var(--text);background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-family:var(--font)}
.tt-copy:hover{border-color:var(--accent);color:var(--accent)}
.tt-copy.copied{background:var(--accent);color:#080808;border-color:var(--accent)}
body.light-mode .sidebar-brand img{background:#141414;border-radius:12px;padding:7px 13px;box-shadow:0 1px 4px rgba(0,0,0,.18)}
body.light-mode .topbar-title img{background:#141414;border-radius:8px;padding:3px 7px}

.tpl-filtros{max-width:980px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:7px}
.tpl-filtros.sub{margin:-2px auto 12px;padding-top:2px}

// LOGIN
// ============================================================
async function fazerLogin(){
  const u = document.getElementById('liUser').value.trim();
  const p = document.getElementById('liPass').value;
  const err = document.getElementById('liErr'); const btn = document.getElementById('liBtn');
  err.textContent='';
  if(!u || !p){ err.textContent='Preencha usuário e senha.'; return; }
  btn.disabled=true;
  try{
    const { data: email, error: e1 } = await sb.rpc('fn_vendas_email_por_usuario', { p_username: u });
    if(e1) throw e1;
    if(!email){ err.textContent='Usuário não encontrado ou inativo.'; btn.disabled=false; return; }
    const { error: e2 } = await sb.auth.signInWithPassword({ email, password: p });
    if(e2){ err.textContent='Senha incorreta.'; btn.disabled=false; return; }
    await entrarApp();
  }catch(ex){ err.textContent='Erro: '+(ex.message||ex); btn.disabled=false; }
}

var AREA_TITULOS={inicio:'Início',templates:'Templates',avisos:'Avisos',faq:'FAQ',destinos:'Destinos Operados',tours:'Links dos Tours',postos:'Postos Médicos',repo:'Repositório',usuarios:'Usuários'};
function setAreaTitle(v){ var el=document.getElementById('areaTitle'); if(el) el.textContent=AREA_TITULOS[v]||''; }
var _areaClockTimer=null;
function startAreaClock(){ if(_areaClockTimer) return; var tick=function(){ var el=document.getElementById('areaClockT'); if(el) el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }; tick(); _areaClockTimer=setInterval(tick,1000); }
var _presenceChannel=null;
function iniciarPresence(){
  if(!currentUser||_presenceChannel) return;
  try{
    _presenceChannel=sb.channel('vendas-presence',{config:{presence:{key:currentUser.username}}});
    _presenceChannel.on('presence',{event:'sync'},function(){
      var st=_presenceChannel.presenceState();
      var users=Object.keys(st).map(function(k){ var a=st[k][0]||{}; return {key:k,name:a.name||'?',papel:a.papel||'',ts:a.ts||0}; });
      _renderOnlineSidebar(users);
    }).subscribe(function(s){
      if(s==='SUBSCRIBED'){ var td=function(){ return {name:currentUser.nome,papel:currentUser.papel,ts:Date.now()}; }; _presenceChannel.track(td()); setInterval(function(){ if(_presenceChannel) _presenceChannel.track(td()); },60000); }
    });
  }catch(e){}
}
function _renderOnlineSidebar(users){
  var el=document.getElementById('sidebar-online'); if(!el) return;
  if(!users||!users.length){ el.innerHTML='<span style="font-size:12px;color:var(--text3);">Ninguém online</span>'; return; }
  users.sort(function(a,b){ return String(a.name).localeCompare(String(b.name),'pt-BR'); });
  var now=Date.now();
  el.innerHTML=users.map(function(u){
    var isMe=u.key===currentUser.username;
    var age=now-(u.ts||now);
    var dot=age<120000?'#22c55e':(age<600000?'#f59e0b':'#ef4444');
    var ini=(u.name||'?').trim().split(/\s+/).map(function(x){return x[0];}).slice(0,2).join('').toUpperCase();
    return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;"><div style="position:relative;flex-shrink:0;"><div style="width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#080808;">'+escH(ini)+'</div><div style="position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:'+dot+';border:2px solid var(--surface);"></div></div><span style="flex:1;font-size:12px;color:var(--text);font-weight:'+(isMe?'700':'400')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escH(u.name)+(isMe?' (você)':'')+'</span></div>';
  }).join('');
}

async function entrarApp(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ return; }
  const email = session.user.email;
  const { data: me } = await sb.from('vendas_auth').select('*').eq('auth_email', email).maybeSingle();
  if(!me || me.status!=='ativo'){ await sb.auth.signOut(); document.getElementById('liErr').textContent='Acesso inativo. Fale com um admin.'; document.getElementById('liBtn').disabled=false; return; }
  currentUser = { username: me.username, nome: me.nome, papel: me.papel, auth_email: email };
  // perfil UI
  document.getElementById('profileNome').textContent = me.nome;
  document.getElementById('pmNome').textContent = me.nome;
  const papelTxt = me.papel==='admin'?'Admin':(me.papel==='espectador'?'Espectador':'Vendedor');
  document.getElementById('profileRole').innerHTML = icon(me.papel==='admin'?'shield':'user')+' '+papelTxt;
  document.getElementById('pmSub').textContent = papelTxt+' · Fui Gostei Trips';
  const av=document.getElementById('profileAvatar');
  av.textContent=(me.nome||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase();
  av.classList.toggle('admin', me.papel==='admin');
  // mostra app
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  renderNav();
  carregarTemplates();
  carregarInicio();
  startAreaClock(); setAreaTitle('inicio'); iniciarPresence();
}

function navItem(id,iconName,label,onclick,active){
  return '<button class="nav-item'+(active?' active':'')+'" onclick="'+onclick+'">'+icon(iconName)+' '+escH(label)+'</button>';
}
function renderNav(){
  var h='';
  h+='<div class="nav-section">Principal</div>';
  h+='<button class="nav-item'+(currentView==='inicio'?' active':'')+'" onclick="irView(\'inicio\')">'+icon('home')+' Início</button>';
  h+='<button class="nav-item'+(currentView==='templates'?' active':'')+'" onclick="irTemplates(null,null)">'+icon('layout-grid')+' Templates</button>';

  h+='<button class="nav-item'+(currentView==='destinos'?' active':'')+'" onclick="irView(\'destinos\')">'+icon('mountain')+' Destinos Operados</button>';
  h+='<button class="nav-item'+(currentView==='tours'?' active':'')+'" onclick="irView(\'tours\')">'+icon('route')+' Links dos Tours</button>';
  h+='<button class="nav-item'+(currentView==='postos'?' active':'')+'" onclick="irView(\'postos\')">'+icon('shield')+' Postos Médicos</button>';
  h+='<div class="nav-section">Recursos</div>';
  h+='<button class="nav-item'+(currentView==='repo'?' active':'')+'" onclick="irView(\'repo\')">'+icon('folder')+' Repositório</button>';
  if(isAdmin()){ h+='<div class="nav-section">Administração</div>'; h+='<button class="nav-item'+(currentView==='usuarios'?' active':'')+'" onclick="irView(\'usuarios\')">'+icon('users')+' Usuários</button>'; }
  document.getElementById('nav').innerHTML=h;
}

let currentView='inicio';
function irView(v){
  if(v==='usuarios' && !isAdmin()){ irTemplates(null,null); return; }

  if(v==='postos') carregarPostos();
  if(v==='repo') carregarRepo();
  if(v==='usuarios') carregarUsuarios();
}
function irTemplates(destino,tipo){
  currentView='templates'; setAreaTitle('templates'); _filtro={destino,tipo}; _busca=''; document.getElementById('busca').value='';
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-templates').classList.add('active');

// ============================================================
// TEMPLATES
// ============================================================
async function carregarTemplates(){
  try{
    const { data, error } = await sb.from('mensagens_vendas').select('*').order('ordem',{ascending:true});
    if(error) throw error;
    _templates = data||[];
    renderTemplates();
  }catch(ex){ document.getElementById('tplArea').innerHTML='<div class="loading">Erro ao carregar: '+escH(ex.message||ex)+'</div>'; }
}

function filtrar(){
  const q=_busca.toLowerCase();
  return _templates.filter(t=>{
    if(t.status==='inativo' && !(isAdmin() && _verInativos)) return false;
    if(_filtro.destino && t.destino!==_filtro.destino) return false;
    if(_filtro.tipo && t.tipo!==_filtro.tipo) return false;
    if(q){ const hay=(t.titulo+' '+t.texto).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
}

function renderTemplates(){
  const area=document.getElementById('tplArea');
  var bar='<div class="tpl-filtros">';
  bar+='<button class="tt-chip'+((!_filtro.destino)?' on':'')+'" onclick="irTemplates(null,null)">Todos</button>';
  DESTINOS.forEach(function(d){ bar+='<button class="tt-chip'+(_filtro.destino===d?' on':'')+'" onclick="irTemplates(\''+d.replace(/'/g,"\\'")+'\',null)">'+escH(d)+'</button>'; });
  bar+='<button class="tt-chip'+(_filtro.destino==='Geral'?' on':'')+'" onclick="irTemplates(\'Geral\',null)">Outros</button>';
  bar+='</div>';
  if(_filtro.destino==='Geral'){
    bar+='<div class="tpl-filtros sub"><button class="tt-chip'+((!_filtro.tipo)?' on':'')+'" onclick="irTemplates(\'Geral\',null)">Todos os tipos</button>';
    OUTROS.forEach(function(t){ bar+='<button class="tt-chip'+(_filtro.tipo===t?' on':'')+'" onclick="irTemplates(\'Geral\',\''+t.replace(/'/g,"\\'")+'\')">'+escH(t)+'</button>'; });
    bar+='</div>';
  }
  var head='<div class="view-toolbar">'+(isAdmin()?('<button class="btn-novo" onclick="abrirNovoTpl()">'+icon('pencil')+' Novo template</button>'):'')+'</div>';
  var inv=isAdmin()?('<div style="max-width:980px;margin:0 auto 4px;display:flex;justify-content:flex-end"><label style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" '+(_verInativos?'checked':'')+' onchange="_verInativos=this.checked;renderTemplates()"> mostrar inativos</label></div>'):'';
  var rows=filtrar();
  area.innerHTML=head+bar+inv+_renderCards(rows);
}

function _renderCards(rows){
  if(!rows.length) return '<div class="loading">Nenhuma mensagem encontrada.</div>';
  // agrupa destino -> tipo
  const g={};
  rows.forEach(t=>{ (g[t.destino]=g[t.destino]||{})[t.tipo]=(g[t.destino][t.tipo]||[]); g[t.destino][t.tipo].push(t); });
  const ordemDest = ['Atacama','Uyuni','Santiago','Peru','Cartagena','San Andrés','Geral'];
  let h='';
  ordemDest.filter(d=>g[d]).forEach(d=>{
    h+='<div class="tpl-group"><div class="tpl-group-title">'+icon(d==='Geral'?'tag':(DEST_ICON[d]||'tag'))+' '+escH(d==='Geral'?'Outros':d)+'</div>';
    Object.keys(g[d]).sort().forEach(tp=>{
      h+='<div class="tpl-sub">'+escH(tp)+'</div><div class="cards">';
      g[d][tp].forEach(t=> h+=cardHTML(t));
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

function cardHTML(t){

  let badges='<span class="card-badge '+badgeClasse(t.destino)+'">'+escH(t.destino==='Geral'?t.tipo:t.destino)+'</span>';
  if(interno) badges='<span class="selo-interno">'+icon('triangle-alert')+' Uso interno</span>'+badges;
  if(inativo) badges='<span class="badge-inativo">inativo</span>'+badges;
  return '<div class="card'+(inativo?' inativo':'')+'">'
    +'<div class="card-header"><div class="card-title">'+escH(t.titulo)+'</div><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">'+badges+'</div></div>'
    +'<div class="card-text" id="txt-'+t.id+'">'+escH(t.texto)+'</div>'
    +'<div class="card-actions">'
    +'<button class="btn-expand" onclick="expandir('+t.id+',this)">Ver mais</button>'
    +'<button class="btn-copy" onclick="copiar('+t.id+',this)">'+icon('copy')+' Copiar mensagem</button>'

    +'</div>';
}

async function _fetchHubAvisos(){
  if(!SB_HUB_ANON || SB_HUB_ANON.indexOf('COLE_')===0) return [];
  try{ const { data, error } = await sbHub.from('vw_vendas_avisos').select('*').order('created_at',{ascending:false}); if(error) throw error; return data||[]; }
  catch(e){ return []; }
}
async function carregarAvisos(){
  const area=document.getElementById('avisosArea');
  area.innerHTML='<div class="loading">Carregando avisos...</div>';
  try{
    const [va, hub] = await Promise.all([
      sb.from('avisos_vendas').select('*').eq('status','ativo').order('fixado',{ascending:false}).order('created_at',{ascending:false}),
      _fetchHubAvisos()
    ]);
    if(va.error) throw va.error;
    _avisos = va.data||[];
    const merged = _avisos.map(function(a){ return Object.assign({_origem:'vendas'}, a); })
      .concat((hub||[]).map(function(m){ return {_origem:'hub', id:'hub_'+m.id, titulo:m.titulo, texto:m.texto, autor:m.autor, created_at:m.created_at, fixado:false}; }));
    merged.sort(function(a,b){ return (b.fixado?1:0)-(a.fixado?1:0) || (new Date(b.created_at)-new Date(a.created_at)); });
    const top = isAdmin()?('<div class="view-toolbar"><button class="btn-novo" onclick="abrirNovoAviso()">'+icon('bell')+' Novo aviso</button></div>'):'<div class="view-toolbar"></div>';
    if(!merged.length){ area.innerHTML=top+'<div class="embreve">'+icon('bell')+'<h3>Sem avisos por enquanto</h3><p>Avisos dos admins e mensagens do HUB marcadas \u201cNotificar Time de Vendas\u201d aparecem aqui.</p></div>'; return; }
    let h=top+'<div class="tpl-group">';
    merged.forEach(function(a){
      const isHub=a._origem==='hub';
      const selo=isHub?('<span class="selo-hub">'+icon('plane')+' HUB</span>'):'';
      const acoes=(!isHub && isAdmin())?('<div class="urow-acts"><button class="btn-mini" onclick="abrirEditarAviso('+a.id+')">'+icon('pencil')+'</button><button class="btn-mini del" onclick="excluirAviso('+a.id+')">'+icon('trash-2')+'</button></div>'):'';
      h+='<div class="card" style="margin-bottom:12px"><div class="card-header"><div class="card-title">'+(a.fixado?icon('bell')+' ':'')+escH(a.titulo)+'</div>'+selo+'</div><div class="card-text expanded">'+escH(a.texto)+'</div><div style="display:flex;align-items:center;margin-top:6px"><div style="font-size:11px;color:var(--text3);flex:1">'+escH(a.autor||'')+(isHub?' \u00b7 via HUB':'')+'</div>'+acoes+'</div></div>';
    });
    h+='</div>';
    area.innerHTML=h;
  }catch(ex){ area.innerHTML='<div class="loading">Erro: '+escH(ex.message||ex)+'</div>'; }
}

async function callEdge(fn, body){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session) throw new Error('Sessão expirada.');
  const r = await fetch(SB_URL + '/functions/v1/' + fn, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + session.access_token },
    body: JSON.stringify(body)
  });
  const j = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error || ('Erro na função '+fn));
  return j;
}

  const nome=document.getElementById('usNome').value.trim();
  const username=document.getElementById('usUsername').value.trim().toLowerCase().replace(/\s+/g,'');

const REPO_BUCKET='repositorio-vendas';
let _repo=[]; let _repoCat='Todos'; let _repoEdit=null;
function _repoIcon(r){
  if(r.tipo==='link') return 'link';
  if(r.tipo==='documento') return 'file-text';
  const m=(r.arquivo_mime||'').toLowerCase(), n=(r.arquivo_nome||'').toLowerCase();
  if(m.startsWith('image/')||/\.(png|jpe?g|gif|webp|svg)$/.test(n)) return 'image';
  if(/sheet|excel|csv/.test(m)||/\.(xlsx?|csv)$/.test(n)) return 'file-spreadsheet';
  return 'file-text';
}
function _repoUrl(r){
  if(r.tipo==='arquivo' && r.arquivo_path){ try{ return sb.storage.from(REPO_BUCKET).getPublicUrl(r.arquivo_path).data.publicUrl; }catch(e){ return '#'; } }
  return r.url||'#';
}
async function carregarRepo(){
  const area=document.getElementById('view-repo');
  area.innerHTML='<div class="loading">Carregando...</div>';
  try{
    const { data, error } = await sb.from('repositorio_vendas').select('*').order('destaque',{ascending:false}).order('created_at',{ascending:false});
    if(error) throw error; _repo=data||[];
    renderRepo();
  }catch(ex){ area.innerHTML='<div class="loading">Erro: '+escH(ex.message||ex)+'</div>'; }
}
function renderRepo(){
  const area=document.getElementById('view-repo');
  let h=isAdmin()?('<div class="view-toolbar"><button class="btn-novo" onclick="abrirNovoRepo()">'+icon('upload')+' Novo item</button></div>'):'<div class="view-toolbar"></div>';
  const cats=['Todos'].concat(Array.from(new Set(_repo.map(r=>r.categoria||'Geral'))));
  h+='<div class="repo-cat-bar">'+cats.map(c=>'<button class="repo-chip'+(c===_repoCat?' on':'')+'" onclick="_repoCat=\''+c.replace(/'/g,"")+'\';renderRepo()">'+escH(c)+'</button>').join('')+'</div>';
  let rows=_repo; if(_repoCat!=='Todos') rows=rows.filter(r=>(r.categoria||'Geral')===_repoCat);
  if(!rows.length){ h+='<div class="embreve">'+icon('folder')+'<h3>Nada por aqui ainda</h3><p>'+(isAdmin()?'Use "Novo item" para adicionar links ou arquivos.':'Sem itens nesta categoria.')+'</p></div>'; area.innerHTML=h; return; }
  h+='<div class="repo-grid">';
  rows.forEach(r=>{
    const url=_repoUrl(r); const isArq=r.tipo==='arquivo';
    h+='<div class="repo-card'+(r.destaque?' destaque':'')+'">'
      +'<div class="repo-top"><span class="ic repo-ic"><svg><use href="#ic-'+_repoIcon(r)+'"/></svg></span>'
      +'<div><div class="repo-nome">'+escH(r.titulo)+'</div>'+(r.descricao?'<div class="repo-desc">'+escH(r.descricao)+'</div>':'')+'</div></div>'

  document.getElementById('repoUrl').value=''; document.getElementById('repoFile').value=''; document.getElementById('repoFileAtual').textContent='';

  document.getElementById('repoTipo').value=r.tipo; document.getElementById('repoTitulo').value=r.titulo; document.getElementById('repoDesc').value=r.descricao||'';

async function salvarRepo(){
  const tipo=document.getElementById('repoTipo').value;
  const row={ tipo, titulo:document.getElementById('repoTitulo').value.trim(), descricao:document.getElementById('repoDesc').value.trim()||null, categoria:document.getElementById('repoCat').value, destaque:document.getElementById('repoDestaque').checked };
  if(!row.titulo){ showToast('Informe o título.'); return; }
  const btn=document.getElementById('repoSalvarBtn'); btn.disabled=true;
  try{
    if(tipo==='arquivo'){
      const f=document.getElementById('repoFile').files[0];
      if(f){
        const safe=f.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const path=Date.now()+'_'+safe;
        const up=await sb.storage.from(REPO_BUCKET).upload(path,f,{upsert:false});
        if(up.error) throw up.error;
        row.arquivo_path=path; row.arquivo_nome=f.name; row.arquivo_mime=f.type||''; row.url=null;
      } else if(!_repoEdit){ showToast('Selecione um arquivo.'); btn.disabled=false; return; }
    } else {
      row.url=document.getElementById('repoUrl').value.trim();
      if(!row.url){ showToast('Informe a URL.'); btn.disabled=false; return; }
      row.arquivo_path=null; row.arquivo_nome=null; row.arquivo_mime=null;
    }
    if(_repoEdit){ const {error}=await sb.from('repositorio_vendas').update(row).eq('id',_repoEdit.id); if(error)throw error; }
    else { const {error}=await sb.from('repositorio_vendas').insert(row); if(error)throw error; }
    fecharModal('modalRepo'); showToast('Item salvo!'); carregarRepo();
  }catch(ex){ showToast('Erro: '+(ex.message||ex)); }
  btn.disabled=false;
}
function excluirRepo(id){
  const r=_repo.find(x=>x.id===id); if(!r)return;
  pedirConfirm('Excluir "'+r.titulo+'"?', async ()=>{
    try{
      if(r.tipo==='arquivo' && r.arquivo_path){ await sb.storage.from(REPO_BUCKET).remove([r.arquivo_path]); }
      const {error}=await sb.from('repositorio_vendas').delete().eq('id',id); if(error)throw error;
      showToast('Excluído.'); carregarRepo();
    }catch(ex){ showToast('Erro: '+(ex.message||ex)); }
  });
}

          +(adm?('<div style="display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)"><button onclick="event.stopPropagation();abrirFaqModal('+f.id+')" style="padding:5px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:var(--font)">'+icon('pencil')+' Editar</button><button onclick="event.stopPropagation();deletarFaq('+f.id+')" style="padding:5px 14px;border:1px solid #f87171;border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:#f87171;font-family:var(--font)">'+icon('trash-2')+' Excluir</button></div>'):'')
          +'</div>'):'')

}

function renderSugestoes(){
  var el=document.getElementById('faq-sug-list'); if(!el) return;
  var adm=isAdmin();
  var pend=_faqSugs.filter(function(s){return !s.respondido;});
  var resp=_faqSugs.filter(function(s){return s.respondido;});
  var h='';
  if(pend.length){ h+='<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:4px 0 6px">Pendentes ('+pend.length+')</div>'; pend.forEach(function(s){ h+=_sugCard(s,adm); }); }
  if(resp.length){ h+='<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px">Respondidas ('+resp.length+')</div>'; resp.forEach(function(s){ h+=_sugCard(s,adm); }); }
  if(!pend.length&&!resp.length) h='<div style="font-size:13px;color:var(--text3)">Nenhuma dúvida enviada ainda.</div>';
  el.innerHTML=h;
}
function _sugToggle(id){ if(_sugOpen[id]) delete _sugOpen[id]; else _sugOpen[id]=1; renderSugestoes(); }
function _sugCard(s,adm){
  var open=!!_sugOpen[s.id]; var done=!!s.respondido;
  var badgeCor=done?'#7cc242':'#ed9b4b';
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">'
    +'<div onclick="_sugToggle('+s.id+')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer">'
    +'<span class="ic" style="font-size:13px;color:var(--text3);transition:transform .2s;transform:'+(open?'rotate(90deg)':'none')+'"><svg><use href="#ic-chevron-right"/></svg></span>'
    +'<div style="flex:1;font-size:13px;font-weight:700;color:var(--text)">'+escH(s.pergunta||'')+'</div>'
    +'<span style="font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;background:'+badgeCor+'26;color:'+badgeCor+';white-space:nowrap">'+(done?'Respondida':'Pendente')+'</span></div>'
    +(open?('<div style="padding:0 14px 12px;border-top:1px solid var(--border)"><div style="font-size:11px;color:var(--text3);padding:8px 0 6px">Por '+escH(s.created_by||'—')+'</div>'
      +(done&&s.resposta?('<div style="padding:8px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);font-size:13px;color:var(--text2);line-height:1.6">'+escH(s.resposta).replace(/\n/g,'<br>')+'</div>'):'<div style="font-size:13px;color:var(--text3);font-style:italic">Ainda sem resposta.</div>')
      +(adm?('<div style="display:flex;gap:6px;margin-top:10px"><button onclick="event.stopPropagation();abrirSugModal('+s.id+')" style="padding:5px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:var(--font)">'+icon('messages-square')+' '+(done?'Editar resposta':'Responder')+'</button><button onclick="event.stopPropagation();deletarSugestao('+s.id+')" style="padding:5px 14px;border:1px solid #f87171;border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:#f87171;font-family:var(--font)">'+icon('trash-2')+' Excluir</button></div>'):'')
      +'</div>'):'')
    +'</div>';
}

function abrirFaqModal(id){
  _faqEditId=id||null;
  document.getElementById('faqModalTitle').textContent=id?'Editar tópico':'Novo tópico';
  var f=id?_faqData.find(function(x){return x.id===id;}):null;
  document.getElementById('faq-m-cat').value=f?f.categoria:'atendimento';
  document.getElementById('faq-m-q').value=f?(f.pergunta||''):'';
  document.getElementById('faq-m-a').value=f?(f.resposta||''):'';
  document.getElementById('modalFaq').classList.add('open');
}
async function salvarFaq(){
  var cat=document.getElementById('faq-m-cat').value;
  var q=document.getElementById('faq-m-q').value.trim();
  var a=document.getElementById('faq-m-a').value.trim();
  if(!q||!a){ showToast('Preencha pergunta e resposta'); return; }
  var row={categoria:cat,pergunta:q,resposta:a,updated_at:new Date().toISOString()};
  if(_faqEditId){
    var r=await sb.from('faq_vendas').update(row).eq('id',_faqEditId);
    if(r.error){ showToast('Erro: '+r.error.message); return; }
    var i=_faqData.findIndex(function(x){return x.id===_faqEditId;}); if(i>=0){ for(var k in row) _faqData[i][k]=row[k]; }
  } else {
    row.created_by=currentUser.nome||currentUser.username;
    var r=await sb.from('faq_vendas').insert([row]).select().single();
    if(r.error){ showToast('Erro: '+r.error.message); return; }
    _faqData.push(r.data);
  }
  fecharModal('modalFaq'); renderFaq(); showToast('Salvo!');
}
async function deletarFaq(id){
  var f=_faqData.find(function(x){return x.id===id;});
  if(!confirm('Excluir "'+(f?f.pergunta:'')+'"?\nEsta ação não pode ser desfeita.')) return;
  var r=await sb.from('faq_vendas').delete().eq('id',id);
  if(r.error){ showToast('Erro: '+r.error.message); return; }
  _faqData=_faqData.filter(function(x){return x.id!==id;}); delete _faqOpen[id]; renderFaq(); showToast('Excluído');
}
async function enviarSugestao(){
  var inp=document.getElementById('sug-input'); var p=inp?inp.value.trim():'';
  if(!p){ showToast('Escreva sua pergunta'); return; }
  var row={pergunta:p,created_by:currentUser.nome||currentUser.username,respondido:false};
  var r=await sb.from('faq_sugestoes_vendas').insert([row]).select().single();
  if(r.error){ showToast('Erro: '+r.error.message); return; }
  _faqSugs.unshift(r.data); if(inp) inp.value=''; renderSugestoes(); showToast('Pergunta enviada!');
}
function abrirSugModal(id){
  _sugRespId=id; var s=_faqSugs.find(function(x){return x.id===id;});
  document.getElementById('sug-preview').textContent=s.pergunta||'';
  document.getElementById('sug-m-cat').value=s.categoria||'atendimento';
  document.getElementById('sug-m-resp').value=s.resposta||'';
  document.getElementById('modalSug').classList.add('open');
}
async function responderSugestao(moverParaFaq){
  var resp=document.getElementById('sug-m-resp').value.trim(); if(!resp){ showToast('Escreva a resposta'); return; }
  var cat=document.getElementById('sug-m-cat').value; var s=_faqSugs.find(function(x){return x.id===_sugRespId;});
  var upd={resposta:resp,respondido:true,categoria:cat,updated_at:new Date().toISOString()};
  var r=await sb.from('faq_sugestoes_vendas').update(upd).eq('id',_sugRespId);
  if(r.error){ showToast('Erro: '+r.error.message); return; }
  for(var k in upd) s[k]=upd[k];
  if(moverParaFaq){
    var row={categoria:cat,pergunta:s.pergunta,resposta:resp,created_by:currentUser.nome||currentUser.username,updated_at:new Date().toISOString()};
    var r2=await sb.from('faq_vendas').insert([row]).select().single();
    if(!r2.error){ _faqData.push(r2.data); showToast('Movido para o FAQ!'); } else showToast('Erro ao mover: '+r2.error.message);
  } else showToast('Respondido!');
  fecharModal('modalSug'); renderFaq(); renderSugestoes();
}
async function deletarSugestao(id){
  if(!confirm('Excluir esta dúvida?')) return;
  var r=await sb.from('faq_sugestoes_vendas').delete().eq('id',id);
  if(r.error){ showToast('Erro: '+r.error.message); return; }
  _faqSugs=_faqSugs.filter(function(x){return x.id!==id;}); renderSugestoes(); showToast('Excluído');
}

function _destRenderRichPage(dest, ct, isAdm) {
  var info = ct.info || {};

  function chips(arr, clr) {
    if (!arr || !arr.length) return '<span style="font-size:12px;color:var(--text3);">—</span>';
    return arr.map(function(it){
      return '<div style="display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:0.5px solid var(--border);">' +
        '<span style="width:5px;height:5px;min-width:5px;border-radius:50%;background:'+(clr||'var(--accent)')+';margin-top:5px;"></span>' +
        '<span style="font-size:13px;color:var(--text);line-height:1.4;">'+it+'</span></div>';
    }).join('');
  }
  function col(title, items, clr) {
    if (!items || !items.length) return '';
    return '<div><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">'+title+'</div>'+chips(items,clr)+'</div>';
  }
  function grid(cols) {
    var valid = cols.filter(Boolean);
    if (!valid.length) return '';
    return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1rem;">'+valid.join('')+'</div>';
  }
  function sec(icon, title, body, key) {
    var eBtn = isAdm
      ? '<button data-destedit data-d="'+dest.replace(/"/g,'&quot;')+'" data-k="'+key+'" style="background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font);"><span class="ic"><svg><use href="#ic-pencil"/></svg></span> Editar</button>'
      : '';
    return '<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;">' +
      '<div style="padding:.65rem 1.1rem;border-bottom:0.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="display:flex;align-items:center;gap:7px;"><span style="font-size:15px;">'+icon+'</span>' +
      '<span style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;">'+title+'</span></div>' +
      eBtn+'</div><div style="padding:1rem 1.1rem;">'+body+'</div></div>';
  }
  function epochBadge(tipo) {
    var s={blue:'background:rgba(59,130,246,.15);color:var(--blue-l);border:0.5px solid rgba(59,130,246,.3);',
           green:'background:rgba(34,197,94,.12);color:var(--green-l);border:0.5px solid rgba(34,197,94,.25);',
           amber:'background:rgba(245,158,11,.12);color:var(--amber);border:0.5px solid rgba(245,158,11,.25);'};
    return s[tipo]||s.blue;
  }

  // INFO
  var infoItems=[];
  if(info.moeda)    infoItems.push(['Moeda',info.moeda]);
  if(info.voltagem) infoItems.push(['Voltagem',info.voltagem]);
  if(info.internet) infoItems.push(['Internet',info.internet]);
  if(info.fuso)     infoItems.push(['Fuso horário',info.fuso]);
  if(info.altitude) infoItems.push(['Altitude',info.altitude]);
  if(info.idioma)   infoItems.push(['Idioma',info.idioma]);
  var infoHtml = info.descricao ? '<p style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px;">'+info.descricao+'</p>' : '';
  if(infoItems.length) {
    infoHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px;">' +
      infoItems.map(function(it){ return '<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:2px;">'+it[0]+'</div><div style="font-size:13px;color:var(--text);">'+it[1]+'</div></div>'; }).join('') + '</div>';
  }
  if(info.melhor_epoca && info.melhor_epoca.length) {
    infoHtml += '<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Melhor época para visitar</div>';
    infoHtml += '<div style="display:flex;flex-direction:column;gap:6px;">' +
      info.melhor_epoca.map(function(e){ return '<div style="display:flex;align-items:center;gap:8px;"><span style="'+epochBadge(e.tipo)+'display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600;white-space:nowrap;">'+e.periodo+'</span><span style="font-size:13px;color:var(--text2);">'+e.desc+'</span></div>'; }).join('')+'</div>';
  }

  // PASSEIOS
  var p=ct.passeios||{};
  var pasHtml=grid([col('Mais vendidos',p.mais_vendidos,'var(--accent)'),col('Pontos turísticos',p.pontos,'var(--blue)'),col('Experiências',p.experiencias,'var(--green)')]);

  // GASTRONOMIA
  var g=ct.gastronomia||{};
  var gastHtml=grid([col('Típicos',g.tipicos),col('Locais',g.locais),col('Turísticos',g.turisticos),g.premium&&g.premium.length?col('Premium',g.premium,'var(--purple)'):'',col('Cafés e bares',g.cafes,'var(--amber)')]);
  if(g.obs&&g.obs.length) gastHtml+='<div style="margin-top:10px;background:var(--surface2);border-radius:8px;padding:8px 12px;">'+chips(g.obs)+'</div>';

  // COMPRAS
  var c=ct.compras||{};
  var compHtml=grid([col('Lembranças',c.lembrancas),c.shoppings&&c.shoppings.length?col('Shoppings',c.shoppings):'',col('Produtos típicos',c.produtos)]);
  if(c.obs&&c.obs.length) compHtml+='<div style="margin-top:10px;background:var(--surface2);border-radius:8px;padding:8px 12px;">'+chips(c.obs)+'</div>';

  // TRANSPORTE
  var t=ct.transporte||{};
  var transHtml=grid([col('Na cidade',t.cidade),col('Aeroporto / Como chegar',t.aeroporto)]);
  if(t.obs&&t.obs.length) transHtml+='<div style="margin-top:10px;background:rgba(239,68,68,.07);border:0.5px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;">'+chips(t.obs,'var(--red)')+'</div>';

  // HOSPEDAGEM
  var h=ct.hospedagem||{};
  var hospHtml=grid([col('Melhores regiões',h.melhores),h.economicas&&h.economicas.length?col('Econômicas',h.economicas):'',h.premium&&h.premium.length?col('Premium',h.premium,'var(--purple)'):'']);
  if(h.obs&&h.obs.length) hospHtml+='<div style="margin-top:10px;background:rgba(245,158,11,.07);border:0.5px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;">'+chips(h.obs,'var(--amber)')+'</div>';

  // IMPORTANTE
  var imp=ct.importante||{};
  var impHtml='';
  if(imp.atencao&&imp.atencao.length) impHtml+='<div style="background:rgba(239,68,68,.08);border:0.5px solid rgba(239,68,68,.22);border-radius:8px;padding:10px 12px;margin-bottom:10px;"><div style="font-size:11px;font-weight:700;color:var(--red-l);margin-bottom:6px;">' + icon('triangle-alert',12) + ' Regiões que exigem atenção</div>'+chips(imp.atencao,'var(--red)')+'</div>';
  impHtml+=grid([col('Geral',imp.geral),imp.passageiro&&imp.passageiro.length?col('O passageiro deve saber',imp.passageiro,'var(--amber)'):'']);

  // OPERACIONAL
  var op=ct.operacional||{};
  var opHtml=grid([col('Dúvidas frequentes',op.duvidas,'var(--blue)'),col('Perfil de cliente',op.perfil,'var(--green)'),col('Upsells',op.upsells,'var(--accent)'),col('Combina com',op.combina,'var(--purple)')]);

  // CONTATOS
  var ctc=ct.contatos||{};
  var ctHtml='';
  if(ctc.aeroporto) ctHtml+='<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Aeroporto</div><div style="font-size:13px;font-weight:700;color:var(--text);">'+ctc.aeroporto+'</div></div>';
  if(ctc.emergencias) {
    var emKeys=Object.keys(ctc.emergencias);
    ctHtml+='<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Emergências</div><div style="display:flex;flex-wrap:wrap;gap:8px;">'+
      emKeys.map(function(k){ return '<div style="background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.22);border-radius:8px;padding:6px 12px;"><div style="font-size:10px;color:var(--red-l);">'+k+'</div><div style="font-size:16px;font-weight:700;color:var(--text);">'+ctc.emergencias[k]+'</div></div>'; }).join('')+'</div></div>';
  }
  if(ctc.apps&&ctc.apps.length) ctHtml+='<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Apps úteis</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+ctc.apps.map(function(a){ return '<span style="background:var(--surface2);border:0.5px solid var(--border);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--text2);">'+a+'</span>'; }).join('')+'</div></div>';

  return sec(icon('map-pin',15),'Informações gerais',infoHtml,'info') +
         sec(icon('mountain',15),'Passeios e atrativos',pasHtml,'passeios') +
         sec(icon('utensils',15),'Gastronomia',gastHtml,'gastronomia') +
         sec(icon('shopping-bag',15),'Compras',compHtml,'compras') +
         sec(icon('car',15),'Transporte e locomoção',transHtml,'transporte') +
         sec(icon('hotel',15),'Hospedagem',hospHtml,'hospedagem') +
         sec(icon('triangle-alert',15),'Informações importantes',impHtml,'importante') +
         sec(icon('lightbulb',15),'Dicas operacionais',opHtml,'operacional') +
         sec(icon('phone',15),'Contatos úteis',ctHtml,'contatos');
}
