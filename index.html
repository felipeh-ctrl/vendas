var DEST_TZ={'Santiago':'America/Santiago','San Pedro de Atacama':'America/Santiago','Uyuni':'America/La_Paz','La Paz':'America/La_Paz','Cusco':'America/Lima','Cartagena':'America/Bogota','San Andrés':'America/Bogota'};
var DEST_MOEDA={'Santiago':{code:'CLP'},'San Pedro de Atacama':{code:'CLP'},'Uyuni':{code:'BOB'},'La Paz':{code:'BOB'},'Cusco':{code:'PEN'},'Cartagena':{code:'COP'},'San Andrés':{code:'COP'}};
var WX_DAY={0:'sun',1:'sun',2:'cloud-sun',3:'cloud',45:'cloud-fog',48:'cloud-fog',51:'cloud-drizzle',53:'cloud-drizzle',55:'cloud-rain',61:'cloud-rain',63:'cloud-rain',65:'cloud-rain',71:'cloud-snow',73:'cloud-snow',75:'snowflake',77:'snowflake',80:'cloud-drizzle',81:'cloud-rain',82:'cloud-lightning',85:'cloud-snow',86:'snowflake',95:'cloud-lightning',96:'cloud-lightning',99:'cloud-lightning'};
var WX_NIGHT={0:'moon',1:'moon',2:'cloud',3:'cloud',45:'cloud-fog',48:'cloud-fog',51:'cloud-rain',53:'cloud-rain',55:'cloud-rain',61:'cloud-rain',63:'cloud-rain',65:'cloud-rain',71:'cloud-snow',73:'cloud-snow',75:'snowflake',77:'snowflake',80:'cloud-rain',81:'cloud-rain',82:'cloud-lightning',85:'cloud-snow',86:'snowflake',95:'cloud-lightning',96:'cloud-lightning',99:'cloud-lightning'};
var DEST_COR={'San Pedro de Atacama':'#22c55e','Santiago':'#3b82f6','Uyuni':'#f59e0b','Cusco':'#ef4444','La Paz':'#8b5cf6','Cartagena':'#f97316','San Andrés':'#92400e','San Andres':'#92400e'};
function _destCor(loc){ var cf=_destGetCfg(loc); if(cf && cf.cor) return cf.cor; return DEST_COR[loc]||'var(--accent)'; }
var _destConfig=[], _destTours=[], _destAtivo=null, _destParceiroAtivo=null, _destMap=null, _destDetailMap=null;
var _destCotacoes={}, _destCotacaoTs=0, _destCotacaoDate='';
var _wxCache={}, WX_CACHE_TTL=1800000;
// Conteúdo rico dos destinos (defaults estáticos + overrides ao vivo do HUB via view read-only)
var _destContentCache={}, _destOverrideByKey={};
function _destContentKey(dest){ return 'dest_content_'+String(dest).replace(/[^a-zA-Z0-9]/g,'_'); }
function _destGetContent(dest){
  if(_destContentCache[dest]) return _destContentCache[dest];
  var k=_destContentKey(dest); var ov=_destOverrideByKey[k];
  if(ov){ try{ var parsed=(typeof ov==='string')?JSON.parse(ov):ov; _destContentCache[dest]=parsed; return parsed; }catch(e){} }
  var def=(typeof _DEST_DEFAULTS!=='undefined')?_DEST_DEFAULTS[dest]:null;
  if(def) _destContentCache[dest]=def;
  return def||null;
}
function _destGetCoords(loc){ var c=_destConfig.find(function(x){return x.localidade===loc;}); if(c && c.lat && c.lng) return [parseFloat(c.lat),parseFloat(c.lng)]; return DEST_COORDS[loc]||null; }
function _destGetCfg(loc){ return _destConfig.find(function(x){return x.localidade===loc;})||null; }
function _destHoraLocal(dest){ var tz=DEST_TZ[dest]; if(!tz) return ''; try{ return new Intl.DateTimeFormat('pt-BR',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date()); }catch(e){ return ''; } }
function _destIniciarRelogioCard(dest){ var s=dest.replace(/[^a-zA-Z0-9]/g,'_'); var el=document.getElementById('hl-'+s); if(!el||!DEST_TZ[dest]) return; var tick=function(){ var hh=_destHoraLocal(dest); if(hh){ var e2=document.getElementById('hl-'+s); if(e2) e2.innerHTML=icon('clock')+' '+hh; } }; setInterval(tick,60000); }
async function _destLoadCotacoes(){ if(_destCotacaoTs) return; try{ var r=await fetch('https://open.er-api.com/v6/latest/BRL'); var d=await r.json(); if(d&&d.rates){ _destCotacoes=d.rates; _destCotacaoTs=Date.now(); _destCotacaoDate=d.time_last_update_utc?new Date(d.time_last_update_utc).toLocaleDateString('pt-BR'):new Date().toLocaleDateString('pt-BR'); } }catch(e){} }
function _destFormatCotacao(dest){ var m=DEST_MOEDA[dest]; if(!m||!_destCotacoes[m.code]) return ''; var rate=_destCotacoes[m.code]; var f=rate>=100?Math.round(rate).toLocaleString('pt-BR'):rate.toFixed(2); return '1 BRL = '+f+' '+m.code; }
function _destRenderCotacaoCard(dest){ var s=dest.replace(/[^a-zA-Z0-9]/g,'_'); var el=document.getElementById('cot-'+s); if(!el) return; var att=0; var chk=function(){ var e2=document.getElementById('cot-'+s); if(!e2) return; var txt=_destFormatCotacao(dest); if(txt){ e2.style.color='var(--text2)'; e2.innerHTML=icon('banknote')+' '+txt; } else if(att<10){ att++; setTimeout(chk,1000); } else { e2.style.display='none'; } }; setTimeout(chk,500); }
function _wxIcon(code,isDay){ var map=(isDay===0)?WX_NIGHT:WX_DAY; return map[code]||'thermometer'; }
function _wxDayLabel(dateStr,i){ if(i===0) return 'Hoje'; if(i===1) return 'Amanhã'; var d=new Date(dateStr+'T12:00:00'); return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()]; }
function _wxRenderCard(el,data){
  var days=data.daily.time, codes=data.daily.weathercode, maxT=data.daily.temperature_2m_max, minT=data.daily.temperature_2m_min, cw=data.current_weather||null;
  var nowHtml='';
  if(cw){ var isDay=(cw.is_day!==undefined)?cw.is_day:1; var nowIcon=_wxIcon(cw.weathercode,isDay); var nowTemp=Math.round(cw.temperature);
    nowHtml='<div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:8px 10px;margin-bottom:6px;"><span style="font-size:28px;line-height:1;">'+icon(nowIcon)+'</span><div style="flex:1;"><div style="font-size:22px;font-weight:800;color:var(--text);line-height:1;">'+nowTemp+'°C</div><div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-top:2px;">'+(isDay?icon('sun')+' Dia':icon('moon')+' Noite')+' · Agora</div></div></div>'; }
  var cols=days.slice(1,4).map(function(d,i){ var wxc=_wxIcon(codes[i+1]); var mx=Math.round(maxT[i+1]); var mn=Math.round(minT[i+1]); var lbl=_wxDayLabel(d,i+1);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;"><span style="font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">'+lbl+'</span><span style="font-size:18px;line-height:1;">'+icon(wxc)+'</span><span style="font-size:11px;font-weight:700;color:var(--text);">'+mx+'°</span><span style="font-size:10px;color:var(--text3);">'+mn+'°</span></div>'; }).join('');
  el.innerHTML='<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px;"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Clima</div>'+nowHtml+'<div style="display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:8px 6px;">'+cols+'</div></div>';
}
async function _destCarregarClima(dest){ var coords=_destGetCoords(dest); var s=dest.replace(/[^a-zA-Z0-9]/g,'_'); var el=document.getElementById('wx-'+s); if(!el) return; if(!coords){ el.innerHTML=''; return; } var cached=_wxCache[dest]; if(cached&&(Date.now()-cached.ts)<WX_CACHE_TTL){ _wxRenderCard(el,cached.data); return; } var url='https://api.open-meteo.com/v1/forecast?latitude='+coords[0]+'&longitude='+coords[1]+'&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=4'; try{ var resp=await fetch(url); if(!resp.ok) throw 0; var data=await resp.json(); _wxCache[dest]={data:data,ts:Date.now()}; var e2=document.getElementById('wx-'+s); if(e2) _wxRenderCard(e2,data); }catch(e){ var e3=document.getElementById('wx-'+s); if(e3) e3.innerHTML='<span style="font-size:11px;color:var(--text3);">Clima indisponível</span>'; } }
function _destTrunc(t,max){ t=String(t||''); return t.length>max?t.slice(0,max)+'...':t; }
function _destLoadLeaflet(){ return new Promise(function(res){ if(window.L){ res(); return; } if(!document.querySelector('link[href*="leaflet"]')){ var lnk=document.createElement('link'); lnk.rel='stylesheet'; lnk.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(lnk); } var sc=document.createElement('script'); sc.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'; sc.onload=res; sc.onerror=function(){res();}; document.head.appendChild(sc); }); }

function _destLista(){ var out=[]; _destTours.forEach(function(t){ if(t.localidade && out.indexOf(t.localidade)<0) out.push(t.localidade); }); Object.keys(DEST_COORDS).forEach(function(d){ if(out.indexOf(d)<0) out.push(d); }); _destConfig.forEach(function(c){ if(c.localidade && out.indexOf(c.localidade)<0) out.push(c.localidade); }); out.sort(function(a,b){return String(a).localeCompare(String(b),'pt-BR');}); return out; }
async function carregarDestinos(){
  const area=document.getElementById('view-destinos');
  area.innerHTML='<div class="loading">Carregando destinos...</div>';
  await _destLoadLeaflet();
  const _r=await Promise.all([_hubGet('vw_vendas_destinos','localidade'), _hubGet('vw_vendas_tours','localidade'), _hubGet('vw_vendas_entradas','tour'), _hubGet('vw_vendas_dest_content','key')]);
  if(_r[0]===null){ _hubSemKey('view-destinos','Destinos Operados'); return; }
  _destConfig=_r[0]||[];
  _destTours=(_r[1]||[]).filter(function(t){ return t.inativo!==true; });
  _vEntradasArr=_r[2]||[]; _vEntradasMap={}; _vEntradasArr.forEach(function(e){ _vEntradasMap[String(e.id)]=e; });
  // overrides ao vivo do HUB (se a view não existir, cai nos defaults estáticos)
  _destOverrideByKey={}; _destContentCache={};
  (_r[3]||[]).forEach(function(row){ if(row && row.key) _destOverrideByKey[row.key]=row.value; });
  _destAtivo=null; _destParceiroAtivo=null; _destLoadCotacoes();
  if(!_destLista().length){ area.innerHTML='<div class="embreve">'+icon('mountain')+'<h3>Sem destinos</h3><p>Nenhum destino no HUB.</p></div>'; return; }
  area.innerHTML=''
    +'<div id="dest-breadcrumb" style="display:none;max-width:1000px;margin:0 auto 10px"></div>'
    +'<div id="dest-map-wrap" style="max-width:1000px;margin:0 auto 16px"><div id="dest-map" style="height:260px;border-radius:12px;overflow:hidden;border:1px solid var(--border)"></div></div>'
    +'<div id="dest-conteudo" style="max-width:1000px;margin:0 auto"></div>';
  _renderDestView();
  setTimeout(function(){ _destInitMap(); }, 300);
}
function _destInitMap(){
  var mapEl=document.getElementById('dest-map'); if(!mapEl||!window.L) return;
  if(_destMap){ try{_destMap.remove();}catch(e){} _destMap=null; }
  _destMap=L.map('dest-map',{zoomControl:true,scrollWheelZoom:false}).setView([-20,-70],3);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(_destMap);
  _destLista().forEach(function(d){ var coords=_destGetCoords(d); if(!coords) return;
    var count=_destTours.filter(function(t){return t.localidade===d;}).length;
    var ic=L.divIcon({className:'',html:'<div style="background:#cf6514;width:16px;height:16px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);"></div>',iconSize:[16,16],iconAnchor:[8,8]});
    var mk=L.marker(coords,{icon:ic}).addTo(_destMap);
    mk.bindTooltip(d+' · '+count+' tour'+(count!==1?'s':''));
    mk.on('click', (function(dd){ return function(){ _destSelecionar(dd); }; })(d));
  });
  setTimeout(function(){ try{_destMap.invalidateSize(true);}catch(e){} },200);
}
function _renderDestView(){
  var conteudo=document.getElementById('dest-conteudo'); if(!conteudo) return;
  var crumb=document.getElementById('dest-breadcrumb'); var mapWrap=document.getElementById('dest-map-wrap');
  if(!_destAtivo){
    if(mapWrap) mapWrap.style.display='block'; if(crumb) crumb.style.display='none';
    var lista=_destLista();
    var cards=lista.map(function(d){
      var cf=_destGetCfg(d)||{}; var count=_destTours.filter(function(t){return t.localidade===d;}).length;
      var parc=[]; _destTours.forEach(function(t){ if(t.localidade===d && t.parceiro && parc.indexOf(t.parceiro)<0) parc.push(t.parceiro); });
      var s=d.replace(/[^a-zA-Z0-9]/g,'_'); var cor='var(--accent)';
      var pais=cf.pais?'<div style="font-size:11px;color:var(--text3);">'+escH(cf.pais)+'</div>':'';
      var desc=cf.descricao?'<div style="font-size:12px;color:var(--text2);margin:8px 0;line-height:1.5;">'+escH(_destTrunc(cf.descricao,110))+'</div>':'';
      var infoRow='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">';
      if(DEST_TZ[d]) infoRow+='<span id="hl-'+s+'" style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:13px;font-weight:700;color:var(--text);">'+icon('clock')+' '+(_destHoraLocal(d)||'--:--')+'</span>';
      if(DEST_MOEDA[d]) infoRow+='<span id="cot-'+s+'" style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:11px;color:var(--text3);">'+icon('banknote')+' ...</span>';
      infoRow+='</div>';
      return '<div onclick="_destSelecionar(\''+d.replace(/'/g,"\\'")+'\')" style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+cor+';border-radius:12px;padding:16px;cursor:pointer;">'
        +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;">'+(cf.emoji?'<span style="font-size:24px;line-height:1;">'+escH(cf.emoji)+'</span>':icon('map-pin'))+'<div><div style="font-size:15px;font-weight:800;color:var(--text);">'+escH(d)+'</div>'+pais+'</div></div>'
        +desc+infoRow+'<div id="wx-'+s+'"></div>'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);"><span style="font-size:12px;color:var(--text3);">'+count+' tour'+(count!==1?'s':'')+' · '+parc.length+' parceiro'+(parc.length!==1?'s':'')+'</span><span style="font-size:12px;font-weight:700;color:'+cor+';">Ver '+icon('arrow-right')+'</span></div></div>';
    });
    conteudo.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;">'+cards.join('')+'</div>';
    lista.forEach(function(d){ _destIniciarRelogioCard(d); _destRenderCotacaoCard(d); _destCarregarClima(d); });
    return;
  }
  if(mapWrap) mapWrap.style.display='none';
  var d=_destAtivo; var cf=_destGetCfg(d)||{localidade:d}; var s=d.replace(/[^a-zA-Z0-9]/g,'_');
  var cor=_destCor(d);
  var tours=_destTours.filter(function(t){ return t.localidade===d; });
  var parceiros=[]; tours.forEach(function(t){ var p=(t.parceiro && String(t.parceiro).trim())||'Sem parceiro'; if(parceiros.indexOf(p)<0) parceiros.push(p); });
  parceiros.sort(function(a,b){ return String(a).localeCompare(String(b),'pt-BR'); });

  // ----- Drill-down de parceiro (só aparece quando há mais de um parceiro) -----
  if(_destParceiroAtivo){
    if(crumb){ crumb.style.display='block';
      crumb.innerHTML='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
        +'<button class="tt-chip" onclick="_destSelecionar(null)">'+icon('arrow-right')+' Destinos</button>'
        +'<button class="tt-chip" onclick="_destSelecionarParceiro(null)">'+icon('arrow-right')+' '+escH(d)+'</button>'
        +'<span style="font-size:12px;color:var(--text2);font-weight:700;display:inline-flex;align-items:center;gap:5px;"><span style="color:'+cor+'">'+icon('circle',12)+'</span> '+escH(_destParceiroAtivo)+'</span>'
        +'</div>';
    }
    var tp=tours.filter(function(t){ return (((t.parceiro && String(t.parceiro).trim())||'Sem parceiro')===_destParceiroAtivo); });
    var hp='<div class="tt-ghead"><span class="tt-bar"></span><span class="tt-gname">'+escH(_destParceiroAtivo)+'</span><span class="tt-gcount">'+tp.length+(tp.length===1?' tour':' tours')+'</span></div><div class="tt-grid">';
    tp.slice().sort(function(a,b){ return String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'); }).forEach(function(t){ hp+=_tourCardHTML(t); });
    hp+='</div>';
    conteudo.innerHTML=hp;
    return;
  }

  // ----- Página do destino: mini-mapa + header ao vivo + ficha rica + tours -----
  if(crumb){ crumb.style.display='block';
    var chipTours=tours.length?('<button class="tt-chip" onclick="_destScrollTours()">'+icon('route')+' Ver tours ('+tours.length+')</button>'):'';
    crumb.innerHTML='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
      +'<button class="tt-chip" onclick="_destSelecionar(null)">'+icon('arrow-right')+' Voltar aos destinos</button>'
      +chipTours+'</div>';
  }

  var coords=_destGetCoords(d);
  var h='';
  if(coords) h+='<div id="dest-detail-map" style="width:100%;height:220px;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px;"></div>';

  // header com dados AO VIVO (hora local / câmbio / clima) — a ficha estática não tem isso
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+cor+';border-radius:12px;padding:18px;margin-bottom:16px;">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'+(cf.emoji?'<span style="font-size:30px;line-height:1;">'+escH(cf.emoji)+'</span>':icon('map-pin'))+'<div><div style="font-size:20px;font-weight:800;color:var(--text);">'+escH(d)+'</div>'+(cf.pais?'<div style="font-size:12px;color:var(--text3);">'+escH(cf.pais)+'</div>':'')+'</div></div>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 0;">';
  if(DEST_TZ[d]) h+='<span id="hl-'+s+'" style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:700;color:var(--text);">'+icon('clock')+' '+(_destHoraLocal(d)||'--:--')+'</span>';
  if(DEST_MOEDA[d]) h+='<span id="cot-'+s+'" style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--text3);">'+icon('banknote')+' ...</span>';
  h+='</div>';
  h+='<div id="wx-'+s+'" style="margin-top:8px;"></div>';
  h+='</div>';

  // FICHA RICA (9 seções) — override ao vivo do HUB, senão default estático
  var ct=_destGetContent(d);
  if(ct){
    h+=_destRenderRichPage(d, ct, false);
  } else if(cf.descricao){
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.6;">'+escH(cf.descricao)+'</div>';
  }

  // BLOCO DE TOURS — cards INTACTOS (_tourCardHTML). Parceiro-único => direto; multi => grid clicável
  h+='<div id="dest-tours-anchor" style="scroll-margin-top:16px;"></div>';
  h+='<div class="tt-ghead" style="margin-top:6px;"><span class="tt-bar"></span><span class="tt-gname">'+icon('route',14)+' Tours operados</span><span class="tt-gcount">'+tours.length+(tours.length===1?' tour':' tours')+'</span></div>';
  if(!tours.length){
    h+='<div class="embreve">'+icon('route')+'<h3>Sem tours cadastrados</h3><p>Este destino ainda não tem tours no HUB.</p></div>';
  } else if(parceiros.length>1){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:4px;">';
    parceiros.forEach(function(p){
      var qt=tours.filter(function(t){ return (((t.parceiro && String(t.parceiro).trim())||'Sem parceiro')===p); }).length;
      h+='<div onclick="_destSelecionarParceiro(\''+String(p).replace(/'/g,"\\'")+'\')" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;">'
        +'<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;">'+escH(p)+'</div>'
        +'<div style="font-size:12px;color:var(--text3);margin-bottom:8px;">'+qt+' tour'+(qt!==1?'s':'')+'</div>'
        +'<div style="font-size:12px;font-weight:700;color:'+cor+';">Ver tours '+icon('arrow-right',12)+'</div></div>';
    });
    h+='</div>';
  } else {
    var pu=parceiros[0]||'Sem parceiro';
    if(pu!=='Sem parceiro') h+='<div style="font-size:12px;color:var(--text3);margin:2px 0 8px;display:inline-flex;align-items:center;gap:5px;">'+icon('handshake',12)+' '+escH(pu)+'</div>';
    h+='<div class="tt-grid">';
    tours.slice().sort(function(a,b){ return String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'); }).forEach(function(t){ h+=_tourCardHTML(t); });
    h+='</div>';
  }

  conteudo.innerHTML=h;
  _destIniciarRelogioCard(d); _destRenderCotacaoCard(d); _destCarregarClima(d);
  if(coords) setTimeout(function(){ _destInitDetailMap(d,coords,cor); },120);
}
function _destInitDetailMap(dest,coords,cor){

  var el=document.getElementById('dest-detail-map'); if(!el||!window.L) return;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_destDetailMap);
  var cf=_destGetCfg(dest)||{};
  var ic=L.divIcon({className:'',html:'<div style="background:'+(cor||'#cf6514')+';width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);"></div>',iconSize:[14,14],iconAnchor:[7,7]});
  L.marker(coords,{icon:ic}).addTo(_destDetailMap).bindPopup('<b>'+(cf.emoji?cf.emoji+' ':'')+dest+'</b>');

}

function _destSelecionar(d){ _destAtivo=d; _destParceiroAtivo=null; if(_destDetailMap){ try{_destDetailMap.remove();}catch(e){} _destDetailMap=null; } _renderDestView(); if(!d) setTimeout(function(){ _destInitMap(); },200); try{ window.scrollTo(0,0); var mp=document.querySelector('.content'); if(mp) mp.scrollTop=0; }catch(e){} }

var _vEntradasMap = {};
var _vEntradasArr = [];
function _ondePagarMini(op){
  var t='',c='',ic='';
  if(op==='incluido'){t='Incluído';c='#22c55e';ic='check';}
  else if(op==='parque'){t='Parque';c='#f59e0b';ic='leaf';}
  else if(op==='apoio'){t='Apoio';c='#3b82f6';ic='home';}
  else return '';
  return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:'+c+'24;color:'+c+';border:1px solid '+c+'40;">'+icon(ic)+' '+t+'</span>';
}
function _ondePagarChip(op){
  var t='',ic='';
  if(op==='incluido'){t='Incluído';ic='check';}
  else if(op==='parque'){t='Pago no Parque';ic='leaf';}
  else if(op==='apoio'){t='Pago no Ponto de Apoio';ic='home';}
  else return '';
  return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);">'+icon(ic)+' '+t+'</span>';
}
function _entradaPorNome(loc, nome){
  if(!nome) return null;
  var _n=String(nome).trim().toLowerCase();
  var _l=String(loc||'').trim().toLowerCase();
  for(var i=0;i<_vEntradasArr.length;i++){ var e=_vEntradasArr[i];
    if(String(e.tour||'').trim().toLowerCase()===_n && (!_l || String(e.destino||'').trim().toLowerCase()===_l)) return e; }
  return null;
}
function _ingressoInner(ent, corTotal, hero){
  if(!ent) return '';
  var cT = corTotal || 'var(--accent)';
  var comps = [];
  if(ent.componentes){ try{ comps=(typeof ent.componentes==='string')?JSON.parse(ent.componentes):ent.componentes; }catch(e){ comps=[]; } }
  comps = Array.isArray(comps) ? comps.filter(function(c){ return c && (c.descricao || c.valor); }) : [];
  var num=function(v){ var n=parseFloat(v); return isNaN(n)?0:n; };
  var moedaRef=(comps.find(function(c){return c.moeda;})||{}).moeda || ent.moeda || '';
  var moedaPref=moedaRef?(moedaRef+' '):'';
  var obsHtml=(ent.obs && String(ent.obs).trim())?('<div style="font-size:12px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:6px;margin-top:8px;">'+icon('clipboard-list')+' '+ent.obs+'</div>'):'';
  var obrig=comps.filter(function(c){ return !c.grupo || !String(c.grupo).trim(); });
  var gruposMap={}, gruposOrdem=[];
  comps.forEach(function(c){ var g=(c.grupo && String(c.grupo).trim()); if(g){ if(!gruposMap[g]){ gruposMap[g]=[]; gruposOrdem.push(g); } gruposMap[g].push(c); } });
  var totalTxt='';
  if(comps.length){
    var base=0; obrig.forEach(function(c){ if(c.onde_pagar!=='incluido') base+=num(c.valor); });
    var mn=base, mx=base;
    gruposOrdem.forEach(function(g){ var vals=gruposMap[g].map(function(c){ return c.onde_pagar==='incluido'?0:num(c.valor); }); mn+=Math.min.apply(null,vals); mx+=Math.max.apply(null,vals); });
    var fmt=function(v){ return moedaPref+Math.round(v).toLocaleString('pt-BR'); };
    totalTxt=(mn===mx)?fmt(mx):(fmt(mn)+' – '+Math.round(mx).toLocaleString('pt-BR'));
  } else {
    var mostra=ent.onde_pagar!=='incluido' && ent.valor!=null && ent.valor!=='' && ent.valor!=='-';
    totalTxt=mostra?(moedaPref+ent.valor):'';
  }
  var placeCount={}; var fontePlaces=comps.length?comps:[{onde_pagar:ent.onde_pagar}];
  fontePlaces.forEach(function(c){ var o=c.onde_pagar; if(o) placeCount[o]=(placeCount[o]||0)+1; });
  var dominant='', best=0; Object.keys(placeCount).forEach(function(o){ if(placeCount[o]>best){ best=placeCount[o]; dominant=o; } });
  if(!totalTxt && !dominant && !obsHtml) return '';
  var linhaItem=function(c, naEscolha){
    var o=c.onde_pagar||''; var inc=(o==='incluido');
    var tag=inc?_ondePagarMini('incluido'):((o && o!==dominant)?_ondePagarMini(o):'');
    var temV=(c.valor!=null && c.valor!=='' && c.valor!=='-');
    var vp=(c.moeda && c.moeda!==moedaRef)?(c.moeda+' '):'';
    var vtxt=temV?(vp+c.valor):'';
    var valStyle=inc?'color:var(--text3);font-weight:600;text-decoration:line-through;':'color:var(--text);font-weight:600;';
    var nameColor=naEscolha?'var(--text)':'var(--text2)';
    return '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:13px;padding:1px 0;"><span style="color:'+nameColor+';">'+(c.descricao||'—')+'</span><span style="display:flex;align-items:center;gap:8px;flex-shrink:0;">'+tag+'<span style="'+valStyle+'font-variant-numeric:tabular-nums;">'+vtxt+'</span></span></div>';
  };
  var chip=dominant?_ondePagarChip(dominant):'';
  var html;
  if(hero){
    html=totalTxt?('<div style="font-size:22px;font-weight:800;color:'+cT+';line-height:1;">'+totalTxt+'</div>'):'';
    if(chip) html+='<div style="margin-top:7px;">'+chip+'</div>';
  } else {
    html='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;color:var(--text2);">'+icon('ticket')+' <strong style="color:var(--text);">Ingresso'+(totalTxt?':':'')+'</strong></span>'+(totalTxt?('<span style="font-size:15px;font-weight:800;color:'+cT+';">'+totalTxt+'</span>'):'')+chip+'</div>';
  }
  if(obrig.length){
    html+='<div style="display:flex;flex-direction:column;gap:4px;margin-top:'+(hero?'12':'8')+'px;'+(hero?'border-top:1px solid var(--border);padding-top:8px;':'')+'">';
    obrig.forEach(function(c){ html+=linhaItem(c,false); });
    html+='</div>';
  }
  gruposOrdem.forEach(function(g){
    html+='<div style="margin-top:10px;border-left:3px solid '+cT+';padding-left:11px;"><div style="font-size:10px;font-weight:700;color:'+cT+';letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;">Escolha um</div>';
    gruposMap[g].forEach(function(c, idx){ if(idx>0) html+='<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:1px 0;">ou</div>'; html+=linhaItem(c,true); });
    html+='</div>';
  });
  return html+obsHtml;
}
var _ttRows=[]; var _ttDest='Todos';
async function carregarToursValores(){
  const area=document.getElementById('view-tours');
  area.innerHTML='<div class="loading">Carregando tours...</div>';
  const _r=await Promise.all([_hubGet('vw_vendas_tours','localidade'), _hubGet('vw_vendas_entradas','tour')]);
  const rows=_r[0];
  if(rows===null){ _hubSemKey('view-tours','Links dos Tours'); return; }
  _vEntradasArr=_r[1]||[]; _vEntradasMap={}; _vEntradasArr.forEach(function(e){ _vEntradasMap[String(e.id)]=e; });
  _ttRows=(rows||[]).filter(function(r){ return r.inativo!==true; });
  const dests=Array.from(new Set(_ttRows.map(function(r){ return r.localidade||'Outros'; }))).sort(function(a,b){ return a.localeCompare(b,'pt-BR'); });
  if(_ttDest!=='Todos' && dests.indexOf(_ttDest)<0) _ttDest='Todos';
  let h='';
  h+='<div class="tt-controls"><div class="tt-search">'+icon('search')+'<input id="ttBusca" placeholder="Buscar por nome ou código do tour..." oninput="renderTours()"></div>';
  h+='<div class="tt-chips"><button class="tt-chip'+(_ttDest==='Todos'?' on':'')+'" data-d="Todos" onclick="_ttSetDest(this.getAttribute(\'data-d\'))">Todos</button>';
  dests.forEach(function(d){ h+='<button class="tt-chip'+(_ttDest===d?' on':'')+'" data-d="'+escH(d)+'" onclick="_ttSetDest(this.getAttribute(\'data-d\'))">'+escH(d)+'</button>'; });
  h+='</div></div><div class="hubsec" id="ttArea"></div>';
  area.innerHTML=h;
  renderTours();
}
function _ttSetDest(d){ _ttDest=d; document.querySelectorAll('.tt-chip').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-d')===d); }); renderTours(); }
function renderTours(){
  const box=document.getElementById('ttArea'); if(!box) return;
  const ql=((document.getElementById('ttBusca')||{}).value||'').trim().toLowerCase();
  const rows=_ttRows.filter(function(r){
    if(_ttDest!=='Todos' && (r.localidade||'Outros')!==_ttDest) return false;
    if(ql){ var hay=((r.nome||'')+' '+(r.codigo||'')).toLowerCase(); if(hay.indexOf(ql)<0) return false; }
    return true;
  });
  if(!rows.length){ box.innerHTML='<div class="embreve">'+icon('route')+'<h3>Nenhum tour encontrado</h3><p>Tente outro nome ou destino.</p></div>'; return; }
  const g={}; rows.forEach(function(r){ var d=r.localidade||'Outros'; (g[d]=g[d]||[]).push(r); });
  const dests=Object.keys(g).sort(function(a,b){ return a.localeCompare(b,'pt-BR'); });
  let h='<div class="tt-grid">';
  dests.forEach(function(d){
    const n=g[d].length;
    h+='<div class="tt-ghead"><span class="tt-bar"></span><span class="tt-gname">'+escH(d)+'</span><span class="tt-gcount">'+n+(n===1?' tour':' tours')+'</span></div>';
    g[d].slice().sort(function(a,b){ return String(a.nome||'').localeCompare(String(b.nome||''),'pt-BR'); }).forEach(function(r){
      h+=_tourCardHTML(r);
    });
  });
  h+='</div>'; box.innerHTML=h;
}

async function carregarPostos(){
  const area=document.getElementById('view-postos');
  area.innerHTML='<div class="loading">Carregando postos...</div>';
  const rows=await _hubGet('vw_vendas_postos','destino');
  if(rows===null){ _hubSemKey('view-postos','Postos Médicos'); return; }
  let h='<div class="hubsec">';
  if(!rows.length){ h+='<div class="embreve">'+icon('shield')+'<h3>Sem postos</h3><p>Nenhum posto cadastrado no HUB.</p></div></div>'; area.innerHTML=h; return; }
  const g=_grupoPorDestino(rows);
  Object.keys(g).sort(function(a,b){ return a.localeCompare(b,'pt-BR'); }).forEach(function(d){
    const n=g[d].length;

    h+='<div class="tt-grid">';
    g[d].forEach(function(r){
      var c='<div class="tt-card"><div class="tt-name">'+icon('shield')+' '+escH(r.nome||'—')+'</div>';
      var at='';
      if(r.endereco) at+='<div class="tt-attr">'+icon('map-pin')+'<span>'+escH(r.endereco)+'</span></div>';
      if(r.telefone) at+='<div class="tt-attr">'+icon('phone')+'<span><strong>Telefone:</strong> '+escH(r.telefone)+'</span></div>';
      if(r.horario) at+='<div class="tt-attr">'+icon('clock')+'<span><strong>Horário:</strong> '+escH(r.horario)+'</span></div>';
      if(at) c+='<div class="tt-attrs">'+at+'</div>';
      var _pt=[r.nome||'']; if(r.endereco)_pt.push('Endereço: '+r.endereco); if(r.telefone)_pt.push('Telefone: '+r.telefone); if(r.horario)_pt.push('Horário: '+r.horario);
      c+='<div class="tt-foot"><button class="tt-btn tt-copy" onclick="_copiarCard(this)" data-copy="'+_attrEsc(_pt.join('\n'))+'">'+icon('copy')+' Copiar</button></div>';

    });
    h+='</div>';
  });
  h+='</div>'; area.innerHTML=h;
}
